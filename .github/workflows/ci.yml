name: Run test case

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    strategy:
      matrix:
        otp: ['27']
        os: ['ubuntu-latest']
        rebar3: ['3.24.0']
    runs-on: ${{matrix.os}}

    steps:
    - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
      with:
        otp-version: ${{matrix.otp}}
        rebar3-version: ${{matrix.rebar3}}

    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      with:
        repository: 'k32/anvl'
        ref: 'master'
        path: 'anvl'

    - name: ANVL bootstrap
      run: |
        cd anvl && ./bootstrap.escript

    - name: Static checks
      run: |
        ~/.local/bin/anvl

    - name: Smoke tests
      run: |
        make smoke-test

    - name: Long-running property-based tests
      run: |
        make prop-membership

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
